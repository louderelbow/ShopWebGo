
{{ define "admin/role/index.html" }}
{{ template "admin/public/page_header.html" .}}

<style>
    a:focus, .delete:focus {
        outline: none !important; /* 移除浏览器默认聚焦边框 */
    }
</style>
    <!--
        列表展示
    -->
    <div class="table-responsive">
        <table class="table table-bordered">
            <thead>
            <tr class="th">
                <th>角色名称</th>
                <th>角色名称</th>
                <th>角色状态</th>
             
                <th class="text-center">操作</th>
            </tr>
            </thead>
            <tbody>

             {{range $key,$value := .roleList}}   
            <tr>
                <td>{{$value.Title}}</td>               
                <td>{{$value.Description}}</td>
                <td align="center">
                    {{if eq $value.Status 1}}
                    <img class="chStatus" data-id="{{$value.Id}}" data-table="role" data-field="status" src="/static/admin/images/yes.gif" />
                    {{else}}
                    <img class="chStatus"  data-id="{{$value.Id}}" data-table="role" data-field="status" src="/static/admin/images/no.gif" />
                    {{end}}
                </td>
                <td class="text-center">
                    <a href="/admin/role/auth?id={{$value.Id}}">授权</a>
                    <a href="/admin/role/edit?id={{$value.Id}}">修改</a> 
                    <a class="delete" href="/admin/role/delete?id={{$value.Id}}">删除</a>
                </td>
            </tr>             
            {{end}}   
            </tbody>
        </table>
    </div>

<script>
    $(function(){
        baseApp.init();
        // 用【事件委托】监听状态切换（解决动态DOM监听失效问题）
        $(document).on("click", ".chStatus", function(){
            var id = $(this).attr("data-id")
            var table = $(this).attr("data-table")
            var field = $(this).attr("data-field")
            var el = $(this)
            $.get("/admin/changeStatus",{id:id,table:table,field:field},function(response){
                if(response.success){
                    if (el.attr("src").indexOf("yes")!=-1){
                        el.attr("src","/static/admin/images/no.gif")
                    }else{
                        el.attr("src","/static/admin/images/yes.gif")
                    }
                }
            })
        })
    })
    var baseApp={
        init:function(){
            this.initAside()
            this.confirmDelete()
            this.resizeIframe()
        },
        initAside:function(){
            $('.aside h4').click(function(){
                $(this).siblings('ul').slideToggle();
            })
        },
        //设置iframe的高度
        resizeIframe:function(){
            $("#rightMain").height($(window).height()-80)
        },
        // 删除提示（优化版，防止不弹框）
        confirmDelete:function(){
            $(document).on("click", ".delete", function(){
                var flag = confirm("您确定要删除吗?")
                if(!flag){
                    return false;  // 取消删除，阻止跳转
                }
                return flag;
            })
        }
    }

</script>

</body>
</html>

{{end}}
